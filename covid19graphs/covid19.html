<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="shortcut icon" href="assets/avatar.ico" type="image/x-icon">

    <div style="width: 100%;text-align: right;">
        <button class="buttondark" id="themebutton"
            onclick="changetheme(document.getElementById('themebutton').innerHTML)">☀️</button>
    </div>
    <h1 style="font-size:400%">Grafici Covid-19 in Italia</h1>
    <div style="width:100%;text-align: center;font-size: 300%;"><a href="https://github.com/pcm-dpc/COVID-19">Fonte</a>
    </div>
</head>

<body class="darkbody">
    <div style="margin-top:4%; text-align:center"><img class="normal" src="assets/deathconhealperdayline.png"></div>
    <div style="margin-top:4%; text-align:center"><img class="normal" src="assets/tampsperday.png"></div>
    <div style="text-align: center;margin-top: 4%;">
        <div style="text-align:center;display:inline;"><img class="normal" border="1px" src="assets/posnegcumpie.png"></div>
        <div style="text-align:center;display:inline;"><img class="normal" border="1px" src="assets/posnegtodaypie.png"></div>
    </div>
    <div style="margin-top:4%; text-align:center"><img class="normal" src="assets/posnegcumbar.png"></div>
</body>

</html>

<script>
    function changetheme(icon) {
        switch (icon) {
            case '☀️':
                document.getElementsByTagName('body')[0].className = 'lightbody'
                document.getElementById('themebutton').innerHTML = '🌙'
                document.getElementById('themebutton').className = 'buttonlight'
                collection = document.getElementsByTagName('img')
                for (const item of collection) {
                    item.className = 'inverted'
                }
                break;
            case '🌙':
                document.getElementsByTagName('body')[0].className = 'darkbody'
                document.getElementById('themebutton').innerHTML = '☀️'
                document.getElementById('themebutton').className = 'buttondark'
                collection = document.getElementsByTagName('img')
                for (const item of collection) {
                    item.className = 'normal'
                }
                break;
        }
    }
</script>
