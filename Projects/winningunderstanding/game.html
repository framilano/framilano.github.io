<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winning Understanding</title>
    <link rel="stylesheet" href="styles/game.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
    <div class="container">
        <div hidden=1 id="skip-button">Passo</div>

            Tempo rimanente 
            <div id="time-left" class="prevent-select vertical-align-div-content"></div>
        </div>
