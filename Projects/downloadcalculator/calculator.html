<!DOCTYPE html>

<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="../assets/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css?family=Roboto:100&display=swap" rel="stylesheet">

    <script src="scripts/worker.js"></script>
    <div id="title">Download time calculator</div>
</head>

<body>
    <div id="choosedimension">
        <div id="datasizeinput">
            Insert your download size
        </div>
            <input name="chooser" default=0 placeholder="0" min=0 step=0.01 type="number" id="datadim">
            <div id="choosers">
               <input name="chooser" type="radio" id="kb"><label for="kb">kB</label>
                <input name="chooser" type="radio" id="mb"><label for="mb">MB</label>
                <input name="chooser" type="radio" id="gb"><label for="gb">GB</label>
            </div>
            <button type="submit" name="chooser" onclick="go2dwlspeed()">
                >
            </button>
    </div>

    <div hidden=1 id="choosedwlspeed">
        <div id="datadwlinput">
            Insert your download speed
        </div>
        <input name="speedchooser" default=0  placeholder="0" min=0 step="0.01" type="number" id="dataspeed">
        <div id="speedchoosers">
            <input name="speedchooser" type="radio" id="kbit/s"><label for="kbit/s">kBit/s</label>
            <input name="speedchooser" type="radio" id="mbit/s"><label for="mbit/s">MBit/s</label>
            <input name="speedchooser" type="radio" id="gbit/s"><label for="gbit/s">GBit/s</label>
        </div>
        <button onclick="final()">
            >
        </button>
        <div style="margin-top: 1%;">You don't remember your connection speed? Try <a target="_blank"
                href="https://www.fast.com">Fast</a></div>

    </div>

    <div hidden=1 id="result">
        <div id="dataresult">
            It'll take <div id="answer"></div>
        </div><br>
        <button onclick="backtomenu()">
            < </button>
    </div>

    <div class="bottom">Page created by Francesco Milano - Background image from wallpapersafari.com</div>
</body>

</html>
