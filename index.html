<script>
    function changetheme(icon) {
        switch (icon) {
            case '☀️':
            document.getElementsByTagName('body')[0].className='lightbody'
            document.getElementById('themebutton').innerHTML='🌙'
            break;
            case '🌙':
            document.getElementsByTagName('body')[0].className='darkbody'
            document.getElementById('themebutton').innerHTML='☀️'
            break;
        }
    }

    function displaysection(section) {
        switch (section) {
            case 'About':
                document.getElementById('About').hidden = 0
                document.getElementById('Progetti').hidden = 1
                document.getElementById('Contatti').hidden = 1
                break;
            case 'Progetti':
                document.getElementById('About').hidden = 1
                document.getElementById('Progetti').hidden = 0
                document.getElementById('Contatti').hidden = 1
                break;
            case 'Contatti':
                document.getElementById('About').hidden = 1
                document.getElementById('Progetti').hidden = 1
                document.getElementById('Contatti').hidden = 0
                break;
        }
    }
</script>
